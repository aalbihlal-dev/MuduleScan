<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Module Scanner">
<title>Module Scanner</title>
<style>
:root{--bg:#080808;--s1:#111;--s2:#1a1a1a;--bd:#252525;--tx:#e8e8e8;--mu:#555;--mu2:#2a2a2a;--ac:#f59e0b;--bl:#3b82f6;--gn:#22c55e;--rd:#ef4444;--r:10px;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:ui-monospace,'SF Mono',monospace;min-height:100dvh}
.hdr{position:sticky;top:0;z-index:50;background:rgba(8,8,8,.97);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--bd);padding:12px 16px;padding-top:calc(12px + var(--st));display:flex;align-items:center;justify-content:space-between}
.hdr-l .sub{font-size:9px;color:var(--mu);letter-spacing:.2em;margin-bottom:2px}
.hdr-l .ttl{font-size:16px;font-weight:700;color:#fff;letter-spacing:.04em}
.hdr-r .num{font-size:24px;font-weight:700;color:var(--ac);line-height:1;text-align:right}
.hdr-r .lbl{font-size:9px;color:var(--mu);letter-spacing:.12em;text-align:right}
.page{padding:14px 14px 130px}
.empty{text-align:center;padding:80px 20px}
.empty .ico{font-size:52px;margin-bottom:16px}
.empty .t{font-size:13px;color:var(--mu);letter-spacing:.1em;margin-bottom:6px}
.empty .s{font-size:11px;color:var(--mu2);letter-spacing:.06em}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:12px;overflow:hidden;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.ch{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 8px;border-bottom:1px solid var(--bd)}
.csn{font-size:16px;font-weight:700;color:var(--ac);letter-spacing:.05em}
.csn.dim{color:var(--mu);font-size:12px;font-weight:400}
.pills{display:flex;gap:4px;padding:0 12px 10px}
.pill{flex:1;height:3px;border-radius:2px;background:var(--mu2);transition:background .3s}
.pill.done{background:var(--gn)}.pill.act{background:var(--ac)}
.photos{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bd)}
.pc{background:var(--s1);padding:10px;display:flex;flex-direction:column;align-items:center;gap:8px}
.plbl{font-size:9px;font-weight:700;letter-spacing:.15em;color:var(--mu);align-self:flex-start}
.pimg{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:7px;border:1px solid var(--bd);display:block}
.ph{width:100%;aspect-ratio:4/3;border-radius:7px;border:2px dashed var(--mu2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--mu2);cursor:pointer;background:var(--s2)}
.ph:active{border-color:var(--mu)}.ph.off{opacity:.3;pointer-events:none}
.ph .ei{font-size:28px}.ph .et{font-size:9px;letter-spacing:.1em}
.pname{font-size:10px;word-break:break-all;text-align:center;line-height:1.4}
.pname.ready{color:var(--bl)}.pname.dim{color:var(--mu2)}
.srow{padding:8px 12px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.sbadge{font-size:9px;font-weight:700;letter-spacing:.08em;padding:3px 8px;border-radius:4px;flex-shrink:0}
.sscan{background:#0d2a0d;color:var(--gn);border:1px solid #1a4a1a;animation:bl 1s infinite}
.sfound{background:#0d1525;color:var(--bl);border:1px solid #1e3a6a}
.snope{background:#200d0d;color:var(--rd);border:1px solid #4a1a1a}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.sv{font-size:13px;font-weight:700;color:var(--ac)}
.irow{padding:10px 12px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.irow label{font-size:10px;color:var(--mu);white-space:nowrap}
.irow input{flex:1;min-width:0;background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;letter-spacing:.04em;padding:8px 10px;outline:none;-webkit-appearance:none}
.irow input:focus{border-color:var(--ac)}
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:opacity .15s;letter-spacing:.05em}
.btn:active{opacity:.7}.btn:disabled{opacity:.3;cursor:default}
.bsm{height:32px;padding:0 12px;font-size:11px}
.bset{height:40px;padding:0 16px;font-size:13px;background:var(--ac);color:#000;flex-shrink:0}
.bdel{background:var(--s2);color:var(--mu);border:1px solid var(--bd)}
.btm{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(8,8,8,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--bd);padding:12px 14px;padding-bottom:calc(12px + var(--sb));display:flex;gap:10px;align-items:center}
.bnew{flex:1;height:54px;font-size:14px;background:var(--ac);color:#000;border-radius:var(--r)}
.bzip{width:54px;height:54px;font-size:11px;flex-direction:column;gap:1px;background:#0d1525;color:var(--bl);border:1px solid #1e3a6a;border-radius:var(--r)}
.bzip .zi{font-size:18px;line-height:1}
.toast{position:fixed;top:calc(68px + var(--st));left:50%;transform:translateX(-50%);border-radius:20px;padding:8px 20px;font-size:12px;font-weight:700;letter-spacing:.06em;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:92vw;text-align:center}
.tok{background:#0a1f0a;color:var(--gn);border:1px solid #1a4a1a}
.twarn{background:#1a1200;color:var(--ac);border:1px solid #3a2800}
.tshow{opacity:1}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:28px}
.ov.hid{display:none}
.ovt{font-size:16px;font-weight:700;color:#fff;letter-spacing:.06em}
.ovs{font-size:12px;color:var(--mu);text-align:center;max-width:280px}
.prog{width:260px;height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.progf{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}
.spin{font-size:36px;animation:sp 1.2s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.zlink{background:#0d1525;border:1px solid #1e3a6a;border-radius:var(--r);padding:16px;text-align:center;width:100%;max-width:300px}
.zlink p{font-size:11px;color:var(--mu);margin-bottom:10px;letter-spacing:.04em;line-height:1.6}
.zlink a{display:block;background:var(--bl);color:#fff;border-radius:8px;padding:13px;font-size:13px;font-weight:700;letter-spacing:.06em;text-decoration:none}
.zlink a:active{opacity:.8}
.hid{display:none!important}
canvas{display:none}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="sub">ACWA · FIELD TOOL</div>
    <div class="ttl">MODULE SCANNER</div>
  </div>
  <div class="hdr-r">
    <div class="num" id="cnt">0</div>
    <div class="lbl">MODULES</div>
  </div>
</div>

<div class="toast tok" id="toast"></div>

<div class="ov hid" id="ov">
  <div class="spin" id="spin">&#9881;&#65039;</div>
  <div class="ovt" id="ovt">BUILDING ZIP...</div>
  <div class="prog"><div class="progf" id="progf" style="width:0%"></div></div>
  <div class="ovs" id="ovs"></div>
  <div class="zlink hid" id="zlink">
    <p>TAP AND HOLD THE BUTTON BELOW<br>THEN TAP "DOWNLOAD LINKED FILE"</p>
    <a id="zurl" href="#">&#128230; SAVE ZIP FILE</a>
  </div>
  <button class="btn bsm bdel hid" id="ovcls" onclick="closeOv()">CLOSE</button>
</div>

<div class="page">
  <div class="empty" id="empty">
    <div class="ico">&#11036;</div>
    <div class="t">NO MODULES YET</div>
    <div class="s">TAP + NEW MODULE TO START</div>
  </div>
  <div id="list"></div>
</div>

<div class="btm">
  <button class="btn bnew" onclick="add()">+ NEW MODULE</button>
  <button class="btn bzip" onclick="zipAll()"><span class="zi">&#128230;</span>ZIP</button>
</div>

<input type="file" id="ifront" accept="image/*" capture="environment" style="display:none">
<input type="file" id="ilabel" accept="image/*" capture="environment" style="display:none">
<canvas id="cvs"></canvas>

<script>
// ═══════════════════════════════════════════════
// ZIP BUILDER
// ═══════════════════════════════════════════════
const ENC = new TextEncoder();
function u16(n){const b=new Uint8Array(2);new DataView(b.buffer).setUint16(0,n,true);return b}
function u32(n){const b=new Uint8Array(4);new DataView(b.buffer).setUint32(0,n,true);return b}
function cat(){
  const args=Array.from(arguments);
  const tot=args.reduce((s,b)=>s+b.length,0);
  const out=new Uint8Array(tot);
  let p=0;
  for(let i=0;i<args.length;i++){out.set(args[i],p);p+=args[i].length}
  return out;
}
function crc32(d){
  let c=0xFFFFFFFF;
  for(let i=0;i<d.length;i++){
    c^=d[i];
    for(let j=0;j<8;j++) c=(c&1)?(c>>>1)^0xEDB88320:c>>>1;
  }
  return (c^0xFFFFFFFF)>>>0;
}
function mkzip(files){
  const SIG_LF  = new Uint8Array([0x50,0x4B,0x03,0x04]);
  const SIG_CD  = new Uint8Array([0x50,0x4B,0x01,0x02]);
  const SIG_END = new Uint8Array([0x50,0x4B,0x05,0x06]);
  const locals=[];
  let offset=0;
  for(let i=0;i<files.length;i++){
    const f=files[i];
    const nm=ENC.encode(f.name);
    const crc=crc32(f.data);
    const sz=f.data.length;
    const lh=cat(SIG_LF,u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(sz),u32(sz),u16(nm.length),u16(0),nm);
    locals.push({lh:lh,data:f.data,offset:offset,nm:nm,crc:crc,sz:sz});
    offset+=lh.length+sz;
  }
  const cds=[];
  for(let i=0;i<locals.length;i++){
    const f=locals[i];
    cds.push(cat(SIG_CD,u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(f.crc),u32(f.sz),u32(f.sz),u16(f.nm.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(f.offset),f.nm));
  }
  const cdOffset=offset;
  let cdSize=0;
  for(let i=0;i<cds.length;i++) cdSize+=cds[i].length;
  const eocd=cat(SIG_END,u16(0),u16(0),u16(locals.length),u16(locals.length),u32(cdSize),u32(cdOffset),u16(0));
  const parts=[];
  for(let i=0;i<locals.length;i++){parts.push(locals[i].lh);parts.push(locals[i].data)}
  for(let i=0;i<cds.length;i++) parts.push(cds[i]);
  parts.push(eocd);
  return cat.apply(null,parts);
}

// ═══════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════
function toDataURL(file){
  return new Promise(function(ok,err){
    var r=new FileReader();
    r.onload=function(){ok(r.result)};
    r.onerror=err;
    r.readAsDataURL(file);
  });
}
function loadImg(src){
  return new Promise(function(ok,err){
    var img=new Image();
    img.onload=function(){ok(img)};
    img.onerror=err;
    img.src=src;
  });
}
function p2(n){return String(n).padStart(2,'0')}

// ═══════════════════════════════════════════════
// BARCODE  — synchronous init, 3-pass scan
// ═══════════════════════════════════════════════
var BD=null;
if('BarcodeDetector' in window){
  try{ BD=new BarcodeDetector(); }catch(e){}
}

async function readBarcode(dataURL){
  if(!BD) return null;
  var cvs=document.getElementById('cvs');
  var ctx=cvs.getContext('2d');
  try{
    var img=await loadImg(dataURL);
    var W=img.naturalWidth, H=img.naturalHeight;

    // Pass 1: scale to max 1200 wide (fast, avoids timeout on 12MP photos)
    var scale=Math.min(1,1200/W);
    cvs.width=Math.round(W*scale);
    cvs.height=Math.round(H*scale);
    ctx.drawImage(img,0,0,cvs.width,cvs.height);
    var r=await BD.detect(cvs);
    if(r.length) return r[0].rawValue.trim();

    // Pass 2: full resolution
    cvs.width=W; cvs.height=H;
    ctx.drawImage(img,0,0);
    r=await BD.detect(cvs);
    if(r.length) return r[0].rawValue.trim();

    // Pass 3: high contrast grayscale
    var id=ctx.getImageData(0,0,W,H), px=id.data;
    for(var i=0;i<px.length;i+=4){
      var g=Math.round(0.299*px[i]+0.587*px[i+1]+0.114*px[i+2]);
      var b=Math.min(255,Math.max(0,(g-128)*2+128));
      px[i]=px[i+1]=px[i+2]=b;
    }
    ctx.putImageData(id,0,0);
    r=await BD.detect(cvs);
    if(r.length) return r[0].rawValue.trim();
  }catch(e){}
  return null;
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
var mods=[];

function add(){
  var id=Date.now().toString(36)+Math.random().toString(36).slice(2);
  mods.push({id:id,ff:null,furl:null,lf:null,lurl:null,sn:'',ok:false,scanning:false});
  render(id);
  document.getElementById('empty').style.display='none';
  setTimeout(function(){
    var el=document.getElementById('C'+id);
    if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  },120);
}

function remove(id){
  mods=mods.filter(function(m){return m.id!==id});
  var el=document.getElementById('C'+id);
  if(el) el.remove();
  recount();
  if(!mods.length) document.getElementById('empty').style.display='';
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render(id){
  var m=null;
  for(var i=0;i<mods.length;i++) if(mods[i].id===id){m=mods[i];break}
  if(!m) return;
  var s1=!!m.furl, s2=!!m.lurl, dn=m.ok;

  var p1=s1?'done':'act', p2c=s2?'done':(s1?'act':''), p3c=dn?'done':(s2?'act':'');
  var pills='<div class="pills"><div class="pill '+p1+'"></div><div class="pill '+p2c+'"></div><div class="pill '+p3c+'"></div></div>';

  var snTxt=dn
    ?('<span class="csn">'+m.sn+'</span>')
    :('<span class="csn dim">'+(s2?'ENTER S/N':s1?'STEP 2: LABEL':'STEP 1: FRONT')+'</span>');

  var fc=m.furl
    ?('<img class="pimg" src="'+m.furl+'">')
    :('<div class="ph" onclick="cap(\''+id+'\',\'front\')"><div class="ei">&#128247;</div><div class="et">TAP TO SHOOT</div></div>');
  var fn=dn
    ?('<div class="pname ready">M_('+m.sn+').jpg</div>')
    :('<div class="pname dim">'+(m.furl?'waiting for S/N...':'not taken')+'</div>');

  var lc=m.lurl
    ?('<img class="pimg" src="'+m.lurl+'">')
    :('<div class="ph'+(s1?'':' off')+'"'+(s1?' onclick="cap(\''+id+'\',\'label\')"':'')+'>'+
      '<div class="ei">&#128290;</div>'+
      '<div class="et">'+(s1?'TAP TO SHOOT':'AFTER STEP 1')+'</div></div>');
  var ln=dn
    ?('<div class="pname ready">SNP('+m.sn+').jpg</div>')
    :('<div class="pname dim">'+(m.lurl?'waiting for S/N...':'not taken')+'</div>');

  var sr='';
  if(m.scanning){
    sr='<div class="srow"><span class="sbadge sscan">SCANNING BARCODE...</span></div>';
  } else if(!dn&&s2&&m.sn){
    sr='<div class="srow"><span class="sbadge sfound">BARCODE READ</span><span class="sv">'+m.sn+'</span></div>';
  } else if(!dn&&s2&&!m.sn){
    sr='<div class="srow"><span class="sbadge snope">'+(BD?'NOT DETECTED':'NO SCANNER')+' — TYPE BELOW</span></div>';
  }

  var ir=(!dn&&s1&&s2&&!m.scanning)
    ?('<div class="irow"><label>S/N</label>'+
      '<input type="text" id="si'+id+'" value="'+m.sn+'" placeholder="Serial number"'+
      ' autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"'+
      ' oninput="upd(\''+id+'\',this.value)"'+
      ' onkeydown="if(event.key===\'Enter\')setmod(\''+id+'\')">'+
      '<button class="btn bset" id="bset'+id+'" onclick="setmod(\''+id+'\')"'+(m.sn?'':' disabled')+'>SET</button>'+
      '</div>')
    :'';

  var html='<div class="card" id="C'+id+'">'+
    '<div class="ch">'+snTxt+'<button class="btn bsm bdel" onclick="remove(\''+id+'\')">X</button></div>'+
    pills+
    '<div class="photos">'+
    '<div class="pc"><div class="plbl">1 FRONT</div>'+fc+fn+'</div>'+
    '<div class="pc"><div class="plbl">2 LABEL</div>'+lc+ln+'</div>'+
    '</div>'+
    sr+ir+
    '</div>';

  var ex=document.getElementById('C'+id);
  if(ex) ex.outerHTML=html;
  else document.getElementById('list').insertAdjacentHTML('afterbegin',html);
  recount();
}

function upd(id,v){
  for(var i=0;i<mods.length;i++) if(mods[i].id===id){mods[i].sn=v.trim().toUpperCase();break}
  var b=document.getElementById('bset'+id);
  if(b) b.disabled=!v.trim();
}

function setmod(id){
  var m=null;
  for(var i=0;i<mods.length;i++) if(mods[i].id===id){m=mods[i];break}
  if(!m||!m.sn) return;
  m.sn=m.sn.trim().toUpperCase();
  m.ok=true;
  render(id);
  notify('S/N confirmed: '+m.sn);
}

function recount(){
  var n=0;
  for(var i=0;i<mods.length;i++) if(mods[i].ok) n++;
  document.getElementById('cnt').textContent=n;
}

// ═══════════════════════════════════════════════
// CAPTURE
// ═══════════════════════════════════════════════
function cap(id,type){
  var el=document.getElementById(type==='front'?'ifront':'ilabel');
  el.value=''; el._id=id; el._type=type; el.click();
}

document.getElementById('ifront').addEventListener('change',function(){go(this._id,'front',this.files[0])});
document.getElementById('ilabel').addEventListener('change',function(){go(this._id,'label',this.files[0])});

async function go(id,type,file){
  if(!file) return;
  var m=null;
  for(var i=0;i<mods.length;i++) if(mods[i].id===id){m=mods[i];break}
  if(!m) return;

  var url=await toDataURL(file);  // FileReader data URL — works on iOS local files

  if(type==='front'){
    m.ff=file; m.furl=url; render(id);
  } else {
    m.lf=file; m.lurl=url; m.scanning=true; m.sn=''; render(id);
    var res=await readBarcode(url);
    m.scanning=false;
    m.sn=res?res.toUpperCase():'';
    render(id);
    setTimeout(function(){
      var inp=document.getElementById('si'+id);
      if(inp){inp.focus();inp.select();inp.scrollIntoView({behavior:'smooth',block:'center'})}
    },150);
    if(res) notify('Barcode read: '+m.sn);
    else notify(BD?'Not detected — type S/N manually':'Enter S/N manually','warn');
  }
}

// ═══════════════════════════════════════════════
// ZIP EXPORT
// ═══════════════════════════════════════════════
async function zipAll(){
  var ready=mods.filter(function(m){return m.ok&&m.ff&&m.lf});
  if(!ready.length){notify('No confirmed modules yet','warn');return}

  var ov=document.getElementById('ov'),
      ovt=document.getElementById('ovt'),
      ovs=document.getElementById('ovs'),
      pf=document.getElementById('progf'),
      sp=document.getElementById('spin'),
      zl=document.getElementById('zlink'),
      zu=document.getElementById('zurl'),
      cl=document.getElementById('ovcls');

  sp.style.display='block';
  zl.classList.add('hid');
  cl.classList.add('hid');
  ovt.textContent='READING FILES...';
  ovs.textContent='';
  pf.style.width='0%';
  ov.classList.remove('hid');

  var zfiles=[];
  var total=ready.length*2;
  var done=0;

  for(var i=0;i<ready.length;i++){
    var m=ready[i];
    var e1=(m.ff.name.split('.').pop()||'jpg').toLowerCase();
    var e2=(m.lf.name.split('.').pop()||'jpg').toLowerCase();
    ovs.textContent='M_('+m.sn+') front...';
    var d1=new Uint8Array(await m.ff.arrayBuffer());
    zfiles.push({name:'M_('+m.sn+').'+e1, data:d1});
    pf.style.width=Math.round(++done/total*100)+'%';
    ovs.textContent='SNP('+m.sn+') label...';
    var d2=new Uint8Array(await m.lf.arrayBuffer());
    zfiles.push({name:'SNP('+m.sn+').'+e2, data:d2});
    pf.style.width=Math.round(++done/total*100)+'%';
  }

  ovt.textContent='COMPRESSING...';
  ovs.textContent=zfiles.length+' photos';
  await new Promise(function(r){setTimeout(r,60)});

  var bytes=mkzip(zfiles);
  var blob=new Blob([bytes],{type:'application/zip'});
  var href=URL.createObjectURL(blob);
  var now=new Date();
  var fname='modules_'+now.getFullYear()+p2(now.getMonth()+1)+p2(now.getDate())+'.zip';

  // Auto-download (works in Chrome Android, sometimes Safari)
  try{
    var a=document.createElement('a');
    a.href=href; a.download=fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }catch(e){}

  // Always show tap-and-hold link (required on iOS)
  sp.style.display='none';
  ovt.textContent='ZIP READY';
  ovs.textContent=ready.length+' module(s) exported ('+zfiles.length+' photos)';
  zu.href=href; zu.download=fname;
  zu.textContent='SAVE '+fname;
  zl.classList.remove('hid');
  cl.classList.remove('hid');
}

function closeOv(){document.getElementById('ov').classList.add('hid')}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function notify(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(type==='warn'?'twarn':'tok')+' tshow';
  clearTimeout(t._t);
  t._t=setTimeout(function(){t.classList.remove('tshow')},2800);
}
</script>
